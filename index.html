<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى حبيبتي ✨</title>
    <style>
        :root {
            --bg-color: #0b0c1b;
            --star-color: #fff;
            --text-color: #fff;
            --accent-color: #ff7675;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* خلفية النجوم المتلألئة */
        .space {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background-color: var(--star-color);
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); cubic-bezier(0.4, 0, 0.2, 1); }
        }

        /* الحاوية الرئيسية للمحتوى */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 90%;
        }

        /* زر البداية السحري */
        .magic-btn {
            background: linear-gradient(45deg, #ff7675, #6c5ce7);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 118, 117, 0.6);
            transition: all 0.5s ease;
        }

        .magic-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.9);
        }

        /* حاوية القصيدة والرسائل */
        .content-box {
            display: none;
            color: var(--text-color);
        }

        .poem-line {
            font-size: 1.4rem;
            margin: 15px 0;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            line-height: 1.6;
        }

        .poem-line.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* الرسالة الختامية الدافئة */
        .final-message {
            margin-top: 35px;
            font-size: 1.5rem;
            color: #ffeaa7;
            font-weight: bold;
            line-height: 1.8;
            border-top: 1px dashed rgba(255,255,255,0.2);
            padding-top: 25px;
            opacity: 0;
            transition: opacity 2s ease;
            text-shadow: 0 0 15px rgba(255, 234, 167, 0.6);
        }

        .final-message.show {
            opacity: 1;
        }

        .heart {
            color: var(--accent-color);
            display: inline-block;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            to { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <!-- الخلفية الفضائية -->
    <div class="space" id="space"></div>

    <div class="container">
        <!-- زر التشغيل -->
        <button class="magic-btn" id="startBtn" onclick="startMagic()">اضغطي هنا برفق ✨</button>

        <!-- المحتوى المخفي الذي سيظهر تدريجياً -->
        <div class="content-box" id="contentBox">
            <div class="poem-line">بحبك قدر شعرك وكيرلاتو 💖</div>
            <div class="poem-line">بحبك قدر البحر وسمكاتو 🌊</div>
            <div class="poem-line">بحبك قدر الشجر وصفقاتو 🌿</div>
            <div class="poem-line">بحبك قدر القمر ونجماتـو 🌙</div>
            <div class="poem-line">بحبك قدر الورد وريحـاتـو 🌹</div>
            <div class="poem-line">بحبك قدر المطر وقطراتو 🌧️</div>

            <div class="final-message" id="finalMsg">
                بحبك شديد يا حبيبتي كل سنة و انت طيبة ربنا يخليك لي و يحقق ليك امانيك و ان شاءلله السنة الجاية معيدين مع بعض يا قلبي <span class="heart">❤️</span>
            </div>
        </div>
    </div>

    <script>
        // توليد نجوم عشوائية في الخلفية تلقائياً
        const space = document.getElementById('space');
        const starCount = 150;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            
            // أحجام ومواقع عشوائية للنجوم
            const size = Math.random() * 3 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            
            // سرعة وميض عشوائية
            star.style.animationDelay = `${Math.random() * 2}s`;
            star.style.animationDuration = `${Math.random() * 3 + 1}s`;

            space.appendChild(star);
        }

        // تأثير السحر عند الضغط
        function startMagic() {
            const startBtn = document.getElementById('startBtn');
            const contentBox = document.getElementById('contentBox');
            const lines = document.querySelectorAll('.poem-line');
            const finalMsg = document.getElementById('finalMsg');

            // إخفاء الزر بسلاسة
            startBtn.style.opacity = '0';
            setTimeout(() => {
                startBtn.style.display = 'none';
                contentBox.style.display = 'block';
                
                // إظهار أبيات الشعر بيت ورا بيت بفارق زمني (1.2 ثانية بين كل بيت)
                lines.forEach((line, index) => {
                    setTimeout(() => {
                        line.classList.add('show');
                    }, index * 1200);
                });

                // إظهار الرسالة الشخصية في النهاية تماماً بعد انتهاء الأبيات
                setTimeout(() => {
                    finalMsg.classList.add('show');
                }, lines.length * 1200 + 500);

            }, 500);
        }
    </script>
</body>
</html>
